schema = "animus.plugin.v1"
name = "animus-transport-graphql"
version = "0.1.0"
plugin_kind = "transport_backend"
description = "GraphQL transport plugin — exposes daemon control RPC at /graphql"

[capabilities]
streaming = true
websocket = true
subscriptions = true
methods = [
  "transport/start",
  "transport/shutdown",
  "transport/schema",
  "health/check",
]

[transport]
kinds = ["graphql"]
default_port = 8081

[binary]
default = "animus-transport-graphql"
